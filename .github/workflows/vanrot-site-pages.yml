name: Deploy Vanrot Site

on:
  push:
    branches:
      - main
    paths:
      - apps/vanrot-site/**
      - packages/ai/**
      - packages/behavior/**
      - packages/cli/**
      - packages/compiler/**
      - packages/config/**
      - packages/devtools/**
      - packages/forge/**
      - packages/formatters/**
      - packages/runtime/**
      - packages/router/**
      - packages/seo/**
      - packages/ui/**
      - packages/vite-plugin/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - scripts/link-cloudflare-vanrot-site.mjs
      - .github/workflows/vanrot-site-pages.yml
  workflow_dispatch:

concurrency:
  group: vanrot-site-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify site
        run: pnpm verify:source-imports && pnpm --filter @vanrot/vanrot-site typecheck && pnpm --filter @vanrot/vanrot-site test

      - name: Build site
        run: pnpm --filter @vanrot/vanrot-site build

      - name: Link Cloudflare Pages domain
        run: node scripts/link-cloudflare-vanrot-site.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/vanrot-site/dist --project-name=vanrot --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
