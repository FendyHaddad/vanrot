<docs-article-shell [title]="title()" [summary]="summary()" [sectionLinks]="sectionLinks()">
  <docs-section [sectionId]="sectionLinks()[0].id" [title]="sectionLinks()[0].title">
    <p>{{ section0Body }}</p>
  <docs-points-list [points]="section0Points"></docs-points-list>
  </docs-section>

  <docs-section [sectionId]="sectionLinks()[1].id" [title]="sectionLinks()[1].title">
    <p>{{ section1Body }}</p>
  </docs-section>

  <docs-section [sectionId]="sectionLinks()[2].id" [title]="sectionLinks()[2].title">
    <p>{{ section2Body }}</p>
  <docs-code-block [title]="'Pick only the helper family you need'" [code]="section2Code"></docs-code-block>
  </docs-section>

  <docs-section [sectionId]="sectionLinks()[3].id" [title]="sectionLinks()[3].title">
    <p>{{ section3Body }}</p>
  <docs-points-list [points]="section3Points"></docs-points-list>
  </docs-section>

  <docs-section [sectionId]="sectionLinks()[4].id" [title]="sectionLinks()[4].title">
    <p>{{ section4Body }}</p>
  <docs-code-block [title]="'Combobox state'" [code]="section4Code"></docs-code-block>
  </docs-section>

  <docs-section [sectionId]="sectionLinks()[5].id" [title]="sectionLinks()[5].title">
    <p>{{ section5Body }}</p>
  <docs-points-list [points]="section5Points"></docs-points-list>
  </docs-section>

  <docs-section [sectionId]="sectionLinks()[6].id" [title]="sectionLinks()[6].title">
    <p>{{ section6Body }}</p>
  <docs-code-block [title]="'Date picker and table resize'" [code]="section6Code"></docs-code-block>
  </docs-section>

  <docs-section [sectionId]="sectionLinks()[7].id" [title]="sectionLinks()[7].title">
    <p>{{ section7Body }}</p>
  </docs-section>

  <docs-section [sectionId]="sectionLinks()[8].id" [title]="sectionLinks()[8].title">
    <p>{{ section8Body }}</p>
  </docs-section>
</docs-article-shell>
