<main class="home-page">
  <section class="home-hero">
    <vr-badge variant="secondary">October docs</vr-badge>
    <h1>{{ copy.title }}</h1>
    <p>{{ copy.summary }}</p>
    <div class="home-actions">
      <a class="home-action home-action-primary" href="/docs">{{ copy.primaryCta }}</a>
      <a class="home-action home-action-secondary" href="/docs/components">{{ copy.secondaryCta }}</a>
    </div>
  </section>

  <section class="home-grid" aria-label="Framework packages">
    @for (item of packages; track item.name) {
      <vr-card variant="default">
        <h2>{{ item.name }}</h2>
        <p>{{ item.area }}</p>
        <vr-badge variant="outline">{{ item.status }}</vr-badge>
      </vr-card>
    }
  </section>
</main>
